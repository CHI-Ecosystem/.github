name: Org metrics

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: metrics
  cancel-in-progress: true

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      # Mint a short-lived installation token from the chi-deploy-bot GitHub
      # App (installed org-wide) instead of a long-lived classic PAT.
      # Requires CHI_GH_APP_ID + CHI_GH_APP_PRIVATE_KEY secrets on this repo
      # (or org-level with access granted to .github).
      - name: Mint chi-deploy-bot token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CHI_GH_APP_ID }}
          private-key: ${{ secrets.CHI_GH_APP_PRIVATE_KEY }}
          owner: CHI-Ecosystem

      # Renders an SVG with aggregated org stats and commits it to the
      # `metrics` branch, where the profile README embeds it.
      # Only aggregate numbers are rendered — no private repo names, no
      # member identities (memberships are private).
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ steps.app-token.outputs.token }}
          user: CHI-Ecosystem
          filename: github-metrics.svg
          committer_branch: metrics
          template: classic
          base: header, repositories
          config_timezone: Europe/Amsterdam
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_ignored: html, css, dockerfile, makefile
          plugin_followup: yes
          plugin_calendar: no
          # CHI website styling: dark space-technical background, signal pink accents
          extras_css: |
            svg { background: #0d0a10; }
            h1, h2, h3 { color: #E83C70 !important; fill: #E83C70 !important; }
            .field, text, tspan { color: #ffffff; fill: #ffffff; }
            .separator { border-color: #E83C70; }
