name: Org metrics

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: metrics
  cancel-in-progress: true

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      # Renders an SVG with aggregated org stats and commits it to the
      # `metrics` branch, where the profile README embeds it.
      #
      # METRICS_TOKEN must be a classic PAT with `repo` + `read:org` scopes
      # so private-repo language/commit stats are included in the aggregates.
      # Only aggregate numbers are rendered — no private repo names, no
      # member identities (memberships are private).
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: CHI-Ecosystem
          filename: github-metrics.svg
          committer_branch: metrics
          template: classic
          base: header, repositories
          config_timezone: Europe/Amsterdam
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_ignored: html, css, dockerfile, makefile
          plugin_followup: yes
          plugin_calendar: no
          # CHI website styling: dark space-technical background, signal pink accents
          extras_css: |
            svg { background: #0d0a10; }
            h1, h2, h3 { color: #E83C70 !important; fill: #E83C70 !important; }
            .field, text, tspan { color: #ffffff; fill: #ffffff; }
            .separator { border-color: #E83C70; }
